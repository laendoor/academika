name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — ruff + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: cd api && uv sync --frozen
      - name: Lint (ruff)
        run: cd api && uv run ruff check .
      - name: Test (pytest)
        run: cd api && uv run pytest

  alembic-check:
    name: Alembic — migrations check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: academika
          POSTGRES_USER: academika
          POSTGRES_PASSWORD: academika
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: cd api && uv sync --frozen
      - name: upgrade head
        run: cd api && uv run alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://academika:academika@localhost:5432/academika
      - name: check (no pending migrations)
        run: cd api && uv run alembic check
        env:
          DATABASE_URL: postgresql+asyncpg://academika:academika@localhost:5432/academika
      - name: downgrade base
        run: cd api && uv run alembic downgrade base
        env:
          DATABASE_URL: postgresql+asyncpg://academika:academika@localhost:5432/academika
      - name: upgrade head (desde cero — valida flujo completo)
        run: cd api && uv run alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://academika:academika@localhost:5432/academika

  frontend:
    name: Frontend — biome + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Install dependencies
        run: cd ui && npm ci
      - name: Lint (biome)
        run: cd ui && npm run lint
      - name: Build
        run: cd ui && npm run build
