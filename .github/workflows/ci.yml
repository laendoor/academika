name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — ruff + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: cd api && uv sync --frozen
      - name: Lint (ruff)
        run: cd api && uv run ruff check .
      - name: Test (pytest)
        run: cd api && uv run pytest

  frontend:
    name: Frontend — biome + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Install dependencies
        run: cd ui && npm ci
      - name: Lint (biome)
        run: cd ui && npm run lint
      - name: Build
        run: cd ui && npm run build
