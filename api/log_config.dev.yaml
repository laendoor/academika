version: 1
disable_existing_loggers: false

formatters:
  default:
    format: "%(asctime)s %(levelname)-8s %(name)s - %(message)s"
    datefmt: "%H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    formatter: default
    stream: ext://sys.stdout
  file:
    class: logging.FileHandler
    formatter: default
    filename: "../dev-api.log"
    mode: w

loggers:
  uvicorn:
    handlers: [console, file]
    propagate: false
  uvicorn.error:
    handlers: [console, file]
    propagate: false
  uvicorn.access:
    handlers: [console, file]
    propagate: false

root:
  level: INFO
  handlers: [console, file]
