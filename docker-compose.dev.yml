services:
  api:
    build:
      context: ./api
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    env_file: .env
    depends_on:
      - postgres

  ui:
    build:
      context: ./ui
    ports:
      - "3000:3000"
    volumes:
      - ./ui:/app
      - /app/node_modules
    env_file: .env

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: academika
      POSTGRES_USER: academika
      POSTGRES_PASSWORD: academika
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
